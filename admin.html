<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NoteNet — Administrasjon</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f5f7f9;padding:20px}
  .container{max-width:1100px;margin:0 auto;background:#fff;border:1px solid #e6e6e6;padding:18px;border-radius:8px}
  header{display:flex;justify-content:space-between;align-items:center}
  .stats{display:flex;gap:12px;justify-content:center;margin:16px 0}
  .stat{background:#f7f7f8;border:1px solid #ddd;padding:12px 18px;border-radius:12px;text-align:center;min-width:140px}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{padding:10px 12px;border:1px solid #d6d6d6;text-align:left}
  th{background:#fafafa;cursor:pointer;user-select:none}
  .controls{display:flex;gap:10px;align-items:center;margin-bottom:10px}
  .controls input[type="text"]{padding:8px;border:1px solid #ccc;border-radius:6px}
  .controls button{padding:8px 10px;border-radius:6px;border:1px solid #bbb;background:#fff;cursor:pointer}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:opacity .15s}
  .modal.open{visibility:visible;opacity:1}
  .panel{background:#fff;padding:18px;border-radius:8px;width:420px;border:1px solid #ddd}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .row label{min-width:80px}
  .row input,.row select{flex:1;padding:8px;border:1px solid #ccc;border-radius:6px}
  .actions button{margin-right:6px}
  .status-label{padding:6px 8px;border-radius:8px;font-weight:600;border:1px solid #ddd;display:inline-block}
  .status-Aktiv{background:#e8fff0;color:#0a7a2b;border-color:#c8eac9}
  .status-Inaktiv,.status-Deaktivert{background:#fff6e6;color:#a56d00;border-color:#f0e0c8}
  .small{font-size:13px;color:#666}
  .right{display:flex;gap:8px;align-items:center}
  .table-actions button{margin-right:6px}
  .trash{color:#b00}
</style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h2>NoteNet — Aministrasjon</h2>
        <div class="small">Administrer brukere, roller og status</div>
      </div>
      <div class="right">
        <div>Hei Bjørn 👑</div>
      </div>
    </header>

    <div class="stats" id="stats">
      <div class="stat"><small>Totale brukere:</small><div id="totalUsers">0</div></div>
      <div class="stat"><small>Aktive brukere:</small><div id="activeUsers">0</div></div>
      <div class="stat"><small>Premium brukere:</small><div id="premiumUsers">0</div></div>
      <div class="stat"><small>Totale lister:</small><div id="totalLists">0</div></div>
    </div>

    <div class="controls">
      <input id="search" type="text" placeholder="Søk (navn, epost, kode)"/>
      <select id="filterRole">
        <option value="">Alle roller</option>
        <option>Admin</option>
        <option>Premium</option>
        <option>Gratis</option>
      </select>
      <select id="filterStatus">
        <option value="">Alle status</option>
        <option>Aktiv</option>
        <option>Inaktiv</option>
        <option>Deaktivert</option>
      </select>
      <button id="addUser">Legg til bruker</button>
    </div>

    <table id="usersTable" aria-label="Brukerliste">
      <thead>
        <tr>
          <th data-key="kode">Kode ▲</th>
          <th data-key="navn">Bruker</th>
          <th data-key="email">Epost</th>
          <th data-key="rolle">Rolle</th>
          <th data-key="lister">Lister</th>
          <th data-key="status">Status</th>
          <th>Handlinger</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <div class="panel">
      <h3 id="modalTitle">Legg til bruker</h3>
      <div class="row"><label for="mKode">Kode</label><input id="mKode"/></div>
      <div class="row"><label for="mNavn">Navn</label><input id="mNavn"/></div>
      <div class="row"><label for="mEmail">Epost</label><input id="mEmail" type="email"/></div>
      <div class="row"><label for="mRolle">Rolle</label>
        <select id="mRolle"><option>Admin</option><option>Premium</option><option>Gratis</option></select>
      </div>
      <div class="row"><label for="mLister">Lister</label><input id="mLister" type="number" min="0"/></div>
      <div class="row"><label for="mStatus">Status</label>
        <select id="mStatus"><option>Aktiv</option><option>Inaktiv</option><option>Deaktivert</option></select>
      </div>
      <div style="text-align:right;margin-top:12px">
        <button id="cancel">Avbryt</button>
        <button id="save">Lagre</button>
      </div>
    </div>
  </div>

<script>

// Data 
const DEMO = [
  {kode:'A001', navn:'Bjørn', email:'bn@gmail.com', rolle:'Admin', lister:20, status:'Aktiv'},
  {kode:'A002', navn:'Rebecka', email:'ra@gmail.com', rolle:'Premium', lister:15, status:'Aktiv'},
  {kode:'A003', navn:'Andreas', email:'as@gmail.com', rolle:'Gratis', lister:7, status:'Inaktiv'},
  {kode:'A004', navn:'Emanuele', email:'ee@proton.me', rolle:'Premium', lister:13, status:'Aktiv'},
  {kode:'A005', navn:'Hege', email:'he@gmail.com', rolle:'Gratis', lister:5, status:'Deaktivert'},
  {kode:'A006', navn:'Ove', email:'oe@gmail.com', rolle:'Premium', lister:14, status:'Aktiv'}
];

const STORAGE_KEY = 'notenet_brukere_v1';
let state = {
  users: load() || JSON.parse(JSON.stringify(DEMO)),
  sortKey: 'kode',
  sortDir: 1, // 1 asc, -1 desc
  filters: {q:'', rolle:'', status:''}
};

function load(){ try{ const d = localStorage.getItem(STORAGE_KEY); return d?JSON.parse(d):null }catch(e){return null} }
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.users)) }

function renderStats(){
  const total = state.users.length;
  const active = state.users.filter(u=>u.status.toLowerCase().startsWith('aktiv')).length;
  const premium = state.users.filter(u=>u.rolle.toLowerCase()==='premium').length;
  const lists = state.users.reduce((s,u)=>s+Number(u.lister||0),0);
  document.getElementById('totalUsers').textContent = total;
  document.getElementById('activeUsers').textContent = active;
  document.getElementById('premiumUsers').textContent = premium;
  document.getElementById('totalLists').textContent = lists;
}

function applyFilters(users){
  const q = state.filters.q.trim().toLowerCase();
  return users.filter(u=>{
    if(q){
      const hay = [u.kode,u.navn,u.email,u.rolle,String(u.lister),u.status].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(state.filters.rolle && u.rolle !== state.filters.rolle) return false;
    if(state.filters.status && u.status !== state.filters.status) return false;
    return true;
  });
}

function sortUsers(users){
  const key = state.sortKey;
  const dir = state.sortDir;
  return users.slice().sort((a,b)=>{
    let A = a[key], B = b[key];
    if(typeof A === 'string') A = A.toLowerCase();
    if(typeof B === 'string') B = B.toLowerCase();
    if(A < B) return -1*dir;
    if(A > B) return 1*dir;
    return 0;
  });
}

function renderTable(){
  const tbody = document.querySelector('#usersTable tbody');
  tbody.innerHTML = '';
  let users = applyFilters(state.users);
  users = sortUsers(users);
  users.forEach((u, i) => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${u.kode}</td>
      <td>${escapeHtml(u.navn)}</td>
      <td>${escapeHtml(u.email)}</td>
      <td>${u.rolle}</td>
      <td style="text-align:center">${u.lister}</td>
      <td><span class="status-label status-${u.status.replace(/\s+/g,'-')}">${u.status}</span></td>
      <td class="actions"></td>
    `;
    const actionsCell = tr.querySelector('.actions');

    // Status-knapp
    const toggleBtn = document.createElement('button');
    toggleBtn.textContent = u.status.toLowerCase().includes('aktiv') ? 'Deaktiver' : 'Aktiver';
    toggleBtn.className = u.status.toLowerCase().includes('aktiv') ? 'btn-deactivate' : 'btn-activate';
    toggleBtn.addEventListener('click', ()=> {
      updateStatusByCode(u.kode, u.status.toLowerCase().includes('aktiv') ? 'Deaktivert' : 'Aktiv');
    });
    actionsCell.appendChild(toggleBtn);

    // Rediger
    const editBtn = document.createElement('button');
    editBtn.textContent = 'Rediger';
    editBtn.addEventListener('click', ()=> openModal('edit', u.kode));
    actionsCell.appendChild(editBtn);

    // Fjern
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Slett';
    delBtn.className = 'trash';
    delBtn.addEventListener('click', ()=> {
      if(confirm(`Slett bruker ${u.navn} (${u.kode})?`)){
        state.users = state.users.filter(x=>x.kode !== u.kode);
        save(); renderTable();
      }
    });
    actionsCell.appendChild(delBtn);

    tbody.appendChild(tr);
  });
  renderStats();
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]); }

function updateStatusByCode(kode, newStatus){
  const u = state.users.find(x=>x.kode===kode);
  if(!u) return;
  u.status = newStatus;
  save(); renderTable();
}

function ensureUniqueKode(k){
  let base = k || ('U' + Math.floor(Math.random()*9000+1000));
  base = String(base).toUpperCase();
  let out = base, i=1;
  while(state.users.some(u=>u.kode===out)){
    out = base + '-' + i++;
  }
  return out;
}

const modal = document.getElementById('modal');
const mTitle = document.getElementById('modalTitle');
const mKode = document.getElementById('mKode');
const mNavn = document.getElementById('mNavn');
const mEmail = document.getElementById('mEmail');
const mRolle = document.getElementById('mRolle');
const mLister = document.getElementById('mLister');
const mStatus = document.getElementById('mStatus');
let modalMode = 'add';
let editKode = null;

function openModal(mode, kode){
  modalMode = mode;
  if(mode === 'add'){
    mTitle.textContent = 'Legg til bruker';
    mKode.value = ensureUniqueKode('');
    mKode.disabled = false;
    mNavn.value = mEmail.value = '';
    mRolle.value = 'Gratis';
    mLister.value = 0;
    mStatus.value = 'Aktiv';
  } else {
    mTitle.textContent = 'Rediger bruker';
    const u = state.users.find(x=>x.kode===kode);
    if(!u) return;
    editKode = kode;
    mKode.value = u.kode; mKode.disabled = true;
    mNavn.value = u.navn; mEmail.value = u.email; mRolle.value = u.rolle;
    mLister.value = u.lister; mStatus.value = u.status;
  }
  modal.classList.add('open');
}

function closeModal(){ modal.classList.remove('open'); editKode = null; }

document.getElementById('addUser').addEventListener('click', ()=> openModal('add'));
document.getElementById('cancel').addEventListener('click', closeModal);
modal.addEventListener('click', (e)=>{ if(e.target===modal) closeModal(); });

document.getElementById('save').addEventListener('click', ()=>{
  const kode = String(mKode.value).trim();
  const navn = String(mNavn.value).trim();
  const email = String(mEmail.value).trim();
  const rolle = mRolle.value;
  const lister = Number(mLister.value) || 0;
  const status = mStatus.value;

  if(!kode || !navn || !email){ alert('Fyll ut kode, navn og epost'); return; }

  if(modalMode === 'add'){
    if(state.users.some(u=>u.kode===kode)){ alert('Kode finnes fra før'); return; }
    state.users.push({kode, navn, email, rolle, lister, status});
  } else {
    const u = state.users.find(x=>x.kode===editKode);
    if(!u) return;
    u.navn = navn; u.email = email; u.rolle = rolle; u.lister = lister; u.status = status;
  }
  save(); closeModal(); renderTable();
});

// Søking og filter
document.getElementById('search').addEventListener('input', (e)=>{
  state.filters.q = e.target.value; renderTable();
});
document.getElementById('filterRole').addEventListener('change', (e)=>{
  state.filters.rolle = e.target.value; renderTable();
});
document.getElementById('filterStatus').addEventListener('change', (e)=>{
  state.filters.status = e.target.value; renderTable();
});

// Sortering
document.querySelectorAll('#usersTable thead th[data-key]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.key;
    if(state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = 1; }
    // update header arrows
    document.querySelectorAll('#usersTable thead th[data-key]').forEach(h=>{
      if(h.dataset.key === state.sortKey) h.textContent = h.textContent.replace(/[\u25B2\u25BC]/g,'') + (state.sortDir===1? ' ▲':' ▼');
      else h.textContent = h.textContent.replace(/[\u25B2\u25BC]/g,'');
    });
    renderTable();
  });
});

renderTable();
</script>
</body>
</html>
